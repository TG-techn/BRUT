<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricky Brut Dashboard</title>
    <!-- PERBAIKAN: Library Ethers.js yang benar -->
    <script src="https://cdn.ethers.io"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eef2f3; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 350px; border: 1px solid #ddd; }
        .logo-token { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 1rem; border: 3px solid #f3ba2f; object-fit: cover; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-connect { background: #f3ba2f; color: #000; }
        .btn-add { background: #1e1e1e; color: #fff; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        #status { font-size: 0.75rem; color: #888; margin-top: 15px; word-break: break-all; }
        .balance-box { margin: 20px 0; padding: 20px; background: #fffcf0; border-radius: 12px; border: 1px solid #f9e1a1; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://gateway.pinata.cloud/ipfs/bafybeidxbqamvpfxy672swkmg5aftlfc34sp6worj6q3avykarzat2ty6m" alt="Ricky Brut" class="logo-token">
    <h2 id="tokenName">Ricky Brut</h2>
    
    <div class="balance-box">
        <small style="color: #666; text-transform: uppercase; letter-spacing: 1px;">Saldo Anda</small>
        <div style="font-size: 1.8rem; font-weight: 800; color: #333;"><span id="balance">0.00</span> <span id="tokenSymbol" style="color: #f3ba2f;">BRUT</span></div>
    </div>

    <button class="btn-connect" onclick="connectWallet()">Hubungkan MetaMask</button>
    <button class="btn-add" onclick="addTokenToMetaMask()">Tambah Logo ke MetaMask</button>
    
    <p id="status">Status: Dompet Terputus</p>
</div>

<script>
    const contractAddress = "0x9857Ba874F0Cc4Ad35b49728e50CBEA051339de5";
    const tokenSymbol = "BRUT"; 
    const tokenDecimals = 18;
    const tokenImage = "https://gateway.pinata.cloud/ipfs/bafybeidxbqamvpfxy672swkmg5aftlfc34sp6worj6q3avykarzat2ty6m";

    const abi = [
        "function name() view returns (string)",
        "function symbol() view returns (string)",
        "function balanceOf(address) view returns (uint256)"
    ];

    let provider, signer, contract;

    async function connectWallet() {
        if (window.ethereum) {
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                const address = await signer.getAddress();
                
                contract = new ethers.Contract(contractAddress, abi, provider);
                
                const name = await contract.name();
                const symbol = await contract.symbol();
                const balanceRaw = await contract.balanceOf(address);
                const balanceFormatted = ethers.utils.formatEther(balanceRaw);

                document.getElementById("tokenName").innerText = name;
                document.getElementById("tokenSymbol").innerText = symbol;
                document.getElementById("balance").innerText = parseFloat(balanceFormatted).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById("status").innerText = "Terhubung: " + address;
                
            } catch (error) {
                console.error(error);
                alert("Gagal menghubungkan dompet.");
            }
        } else {
            alert("Silakan instal MetaMask!");
        }
    }

    async function addTokenToMetaMask() {
        try {
            const wasAdded = await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: contractAddress,
                        symbol: tokenSymbol,
                        decimals: tokenDecimals,
                        image: tokenImage,
                    },
                },
            });
        } catch (error) {
            console.log(error);
        }
    }
</script>

</body>
</html>
